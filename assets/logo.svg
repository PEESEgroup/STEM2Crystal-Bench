<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128" role="img" aria-label="STEM2Crystal-Bench logo">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6aa0ff"/>
      <stop offset=".55" stop-color="#5b7cff"/>
      <stop offset="1" stop-color="#7d54ff"/>
    </linearGradient>
    <radialGradient id="gloss" cx="50%" cy="2%" r="85%">
      <stop offset="0" stop-color="#ffffff" stop-opacity=".38"/>
      <stop offset=".55" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="vign" cx="50%" cy="55%" r="75%">
      <stop offset=".62" stop-color="#000000" stop-opacity="0"/>
      <stop offset="1" stop-color="#1a1550" stop-opacity=".30"/>
    </radialGradient>
    <linearGradient id="beam" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity=".9"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="atomA" cx="35%" cy="28%" r="78%">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset=".45" stop-color="#a9e7ff"/>
      <stop offset="1" stop-color="#2f8fd0"/>
    </radialGradient>
    <radialGradient id="atomB" cx="35%" cy="28%" r="78%">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset=".45" stop-color="#d9c2ff"/>
      <stop offset="1" stop-color="#7a4fd6"/>
    </radialGradient>
    <radialGradient id="atomC" cx="35%" cy="28%" r="78%">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset=".5" stop-color="#eef3ff"/>
      <stop offset="1" stop-color="#9fb6e8"/>
    </radialGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.1" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="1.4" stdDeviation="1.4" flood-color="#11103a" flood-opacity=".35"/>
    </filter>
  </defs>

  <!-- badge -->
  <rect x="6" y="6" width="116" height="116" rx="30" fill="url(#bg)"/>
  <rect x="6" y="6" width="116" height="116" rx="30" fill="url(#gloss)"/>
  <rect x="6" y="6" width="116" height="116" rx="30" fill="url(#vign)"/>
  <rect x="6.8" y="6.8" width="114.4" height="114.4" rx="29.3" fill="none" stroke="#ffffff" stroke-opacity=".25" stroke-width="1.3"/>

  <!-- focused electron probe (STEM) -->
  <path d="M55 16 L46 70 L82 70 L73 16 Z" fill="url(#beam)" opacity=".55"/>
  <rect x="62.4" y="16" width="3.2" height="50" rx="1.6" fill="#ffffff" opacity=".85"/>

  <!-- lattice bonds -->
  <g stroke="#ffffff" stroke-opacity=".5" stroke-width="2.3" stroke-linecap="round">
    <path d="M86 80 L75 61 M75 61 L53 61 M53 61 L42 80 M42 80 L53 99 M53 99 L75 99 M75 99 L86 80"/>
    <path d="M64 80 L86 80 M64 80 L53 61 M64 80 L75 99"/>
  </g>

  <!-- glossy atoms (sphere look) -->
  <g filter="url(#soft)">
    <circle cx="86" cy="80" r="7.2" fill="url(#atomA)"/>
    <circle cx="75" cy="61" r="7.2" fill="url(#atomB)"/>
    <circle cx="53" cy="61" r="7.2" fill="url(#atomA)"/>
    <circle cx="42" cy="80" r="7.2" fill="url(#atomB)"/>
    <circle cx="53" cy="99" r="7.2" fill="url(#atomA)"/>
    <circle cx="75" cy="99" r="7.2" fill="url(#atomB)"/>
    <circle cx="64" cy="80" r="9"   fill="url(#atomC)"/>
  </g>
</svg>
